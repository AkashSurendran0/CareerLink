version: "3.9"

networks:
  backend-network:
    driver: bridge

services:
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "5000:5000"
    env_file:
      - ./api-gateway/.env.production
    networks:
      - backend-network
    restart: unless-stopped

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "5001:5001"
    env_file:
      - ./user-service/.env.production
    depends_on:
      - api-gateway
    networks:
      - backend-network
    restart: unless-stopped

  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    container_name: admin-service
    ports:
      - "5002:5002"
    env_file:
      - ./admin-service/.env.production
    depends_on:
      - api-gateway
    networks:
      - backend-network
    restart: unless-stopped

  company-service:
    build:
      context: ./company-service
      dockerfile: Dockerfile
    container_name: company-service
    ports:
      - "5003:5003"
    env_file:
      - ./company-service/.env.production
    depends_on:
      - api-gateway
    networks:
      - backend-network
    restart: unless-stopped

  notification-service:
