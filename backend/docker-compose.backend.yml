version: "3.9"

networks:
  backend-network:
    driver: bridge

services:
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    env_file:
      - ./api-gateway/.env.production
    networks:
      - backend-network
    depends_on:
      - user-service
      - admin-service
      - company-service
      - notification-service
      - job-service
      - resume-service
      - post-service
      - subscription-service
      - chat-service
      - report-service
    restart: unless-stopped

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    expose:
      - "5001"
    env_file:
      - ./user-service/.env.production
    networks:
      - backend-network
    restart: unless-stopped

  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    container_name: admin-service
    env_file:
      - ./admin-service/.env.production
    networks:
      - backend-network
    restart: unless-stopped

  company-service:
    build:
      context: ./company-service
      dockerfile: Dockerfile
    container_name: company-service
    env_file:
      - ./company-service/.env.production
    networks:
      - backend-network
    restart: unless-stopped

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    expose:
      - "5004"
    env_file:
      - ./notification-service/.env.production
    networks:
      - backend-network
    restart: unless-stopped

  job-service:
    build:
      context: ./job-service
      dockerfile: Dockerfile
    container_name: job-service
    env_file:
      - ./job-service/.env.production
    networks:
      - backend-network
    restart: unless-stopped

  resume-service:
    build:
      context: ./resume-service
      dockerfile: Dockerfile
    container_name: resume-service
    env_file:
      - ./resume-service/.env.production
    networks:
      - backend-network
    restart: unless-stopped

  post-service:
    build:
      context: ./post-service
      dockerfile: Dockerfile
    container_name: post-service
    env_file:
      - ./post-service/.env.production
    networks:
      - backend-network
    restart: unless-stopped

  subscription-service:
    build:
      context: ./subscription-service
      dockerfile: Dockerfile
    container_name: subscription-service
    env_file:
      - ./subscription-service/.env.production
    networks:
      - backend-network
    restart: unless-stopped

  chat-service:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    container_name: chat-service
    env_file:
      - ./chat-service/.env.production
    networks:
      - backend-network
    restart: unless-stopped

  report-service:
    build:
      context: ./report-service
      dockerfile: Dockerfile
    container_name: report-service
    env_file:
      - ./report-service/.env.production
    networks:
      - backend-network
    restart: unless-stopped